---
- name: Установка Docker SDK для Python (pip)
  become: true
  apt:
    name: python3-pip
    state: present
    update_cache: yes

- name: Установка библиотеки Docker для Python через APT
  ansible.builtin.apt:
    name: python3-docker
    state: present
    update_cache: yes

- name: Запуск Kibana
  docker_container:
    name: kibana
    image: kibana:7.17.10
    state: started
    restart_policy: always
    published_ports:
      - "5601:5601"
    env:
      ELASTICSEARCH_HOSTS: "http://{{ elasticsearch_domain }}:9200"
      ELASTICSEARCH_USERNAME: "elastic"
      ELASTICSEARCH_PASSWORD: "{{ kibana_password }}"
  notify: Recreate Kibana Container