---
- name: Установка репозитория заббикс
  apt:
    deb: "https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_7.0-2+ubuntu24.04_all.deb"
    state: present

- name: Update apt cache
  apt:
    update_cache: yes

- name: Установка агентов
  apt:
    name: zabbix-agent2
    state: present

- name: Конфигурация агентов
  template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
  notify: restart agent

- name: Старт агентов
  service:
    name: zabbix-agent2
    state: started
    enabled: yes